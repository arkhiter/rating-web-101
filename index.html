<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Review Portal</title>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #1e293b; margin-top: 0; font-size: 1.5rem; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 1.2rem; border: 1.5px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; transition: border-color 0.2s; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.1s, background 0.2s; }
        button:hover { background: #1d4ed8; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        #msg { color: #059669; text-align: center; display: none; font-weight: 600; padding: 10px; background: #ecfdf5; border-radius: 8px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Leave a Review</h2>
    <form id="reviewForm">
        <label>Your Name</label>
        <input type="text" name="customerName" placeholder="Full Name" required>

        <label>Rating</label>
        <select name="rating">
            <option value="5">⭐⭐⭐⭐⭐ - Excellent</option>
            <option value="4">⭐⭐⭐⭐ - Very Good</option>
            <option value="3">⭐⭐⭐ - Average</option>
            <option value="2">⭐⭐ - Poor</option>
            <option value="1">⭐ - Terrible</option>
        </select>

        <label>Feedback</label>
        <textarea name="comment" rows="4" placeholder="Tell us about your experience..." required></textarea>

        <button type="submit" id="submitBtn">Submit Review</button>
        <div id="msg">✅ Review submitted successfully!</div>
    </form>
</div>

<script>
    // Your specific Google Apps Script URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz2EKiDS1seGr9BFtUr8jfPOQz4OcEqr2QZcV-8ZJIg9xAGQ93k5w-xtC4dU01HRQDz/exec';
    const form = document.getElementById('reviewForm');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Processing...";

        fetch(scriptURL, { 
            method: 'POST', 
            body: new FormData(form)
        })
        .then(response => {
            console.log('Success!', response);
            btn.style.display = "none";
            msg.style.display = "block";
            form.reset();
        })
        .catch(error => {
            console.error('Error!', error.message);
            alert("Something went wrong. Please try again.");
            btn.disabled = false;
            btn.innerText = "Submit Review";
        });
    });
</script>

</body>
</html>
