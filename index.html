<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รีวิวรสชาติสุดปั่น</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark: #121212;
            --yellow: #f1c40f;
            --white: #ffffff;
            /* สีไล่ระดับ */
            --lvl-1: #ff4d4d; /* แดง */
            --lvl-2: #ffa500; /* ส้ม */
            --lvl-3: #2ecc71; /* เขียว */
            --lvl-4: #3498db; /* ฟ้า */
            --lvl-5: #2980b9; /* น้ำเงิน */
        }

        body {
            font-family: 'Itim', cursive;
            background: var(--dark);
            color: var(--white);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .card {
            background: #222;
            border: 3px solid var(--yellow);
            padding: 30px;
            width: 100%;
            max-width: 480px;
            border-radius: 20px;
            box-shadow: 10px 10px 0px var(--yellow);
        }

        h1 { text-align: center; color: var(--yellow); font-size: 2.5rem; margin-bottom: 0; }
        p.tagline { text-align: center; margin-top: 0; margin-bottom: 30px; font-size: 1.2rem; color: #bbb; }

        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 15px; font-size: 1.3rem; color: var(--yellow); }

        /* ระบบ Radio แบบไล่สี */
        .option-list { display: flex; flex-direction: column; gap: 8px; }
        .radio-item { position: relative; }
        .radio-item input { display: none; }
        .radio-item label {
            display: block;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-radius: 10px;
            background: #333;
            transition: 0.3s;
            border: 2px solid transparent;
            font-size: 1.1rem;
        }

        /* สีแต่ละระดับ */
        .c-1 input:checked + label { background: var(--lvl-1); color: white; transform: scale(1.02); }
        .c-2 input:checked + label { background: var(--lvl-2); color: white; transform: scale(1.02); }
        .c-3 input:checked + label { background: var(--lvl-3); color: white; transform: scale(1.02); }
        .c-4 input:checked + label { background: var(--lvl-4); color: white; transform: scale(1.02); }
        .c-5 input:checked + label { background: var(--lvl-5); color: white; transform: scale(1.02); }

        /* Menu Grid */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

        textarea, input[type="text"] {
            width: 100%;
            padding: 15px;
            background: #333;
            border: 2px solid #444;
            color: white;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: 'Itim', cursive;
            font-size: 1.1rem;
        }

        button {
            background: #ff4757;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            font-size: 1.8rem;
            font-family: 'Itim', cursive;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 5px 0 #c0392b;
            margin-top: 20px;
        }
        button:active { transform: translateY(4px); box-shadow: none; }
        button:disabled { background: #555; box-shadow: none; }

        #thanks { display: none; text-align: center; padding: 40px 0; }
        #thanks h2 { font-size: 3rem; color: var(--yellow); }
    </style>
</head>
<body>

<div class="card">
    <div id="main-form">
        <h1>กินแล้วเป็นไง?</h1>
        <p class="tagline">รีวิวไม่จริงขอให้ขี้แตก!</p>

        <form id="reviewForm">
            <div class="form-group">
                <label>👤 ชื่อผู้เสี่ยงตาย</label>
                <input type="text" name="customerName" placeholder="ระบุชื่อเท่ๆ ของคุณ" required>
            </div>

            <div class="form-group">
                <label>🥜 เมนูที่จัดไป</label>
                <div class="menu-grid">
                    <div class="radio-item c-3"><input type="radio" id="m1" name="menu" value="ปากอ้า" required><label for="m1">ปากอ้า</label></div>
                    <div class="radio-item c-3"><input type="radio" id="m2" name="menu" value="ลิสง"><label for="m2">ลิสง</label></div>
                    <div class="radio-item c-3"><input type="radio" id="m3" name="menu" value="ลันเตา"><label for="m3">ลันเตา</label></div>
                    <div class="radio-item c-3"><input type="radio" id="m4" name="menu" value="หิมพานต์"><label for="m4">หิมพานต์</label></div>
                    <div class="radio-item c-3"><input type="radio" id="m5" name="menu" value="อัลมอนด์"><label for="m5">อัลมอนด์</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>🧂 ความเค็ม (ระดับความเสี่ยง)</label>
                <div class="option-list">
                    <div class="radio-item c-1"><input type="radio" id="s1" name="salty" value="ฟอกไต" required><label for="s1">☠️ ฟอกไต (แดงเดือด)</label></div>
                    <div class="radio-item c-2"><input type="radio" id="s2" name="salty" value="ทำหก"><label for="s2">🟠 ทำหก (ส้มหยุด)</label></div>
                    <div class="radio-item c-3"><input type="radio" id="s3" name="salty" value="กำลังดี"><label for="s3">🟢 กำลังดี (รอดตาย)</label></div>
                    <div class="radio-item c-4"><input type="radio" id="s4" name="salty" value="ดูดนิ้ว"><label for="s4">🔵 ดูดนิ้ว (ฟ้าใส)</label></div>
                    <div class="radio-item c-5"><input type="radio" id="s5" name="salty" value="ลืมใส่"><label for="s5">🔵 ลืมใส่ (น้ำเงินเข้ม)</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>🍯 ความหวาน (เบาหวานถามหา)</label>
                <div class="option-list">
                    <div class="radio-item c-1"><input type="radio" id="sw1" name="sweet" value="ตัดขา" required><label for="sw1">☠️ ตัดขา</label></div>
                    <div class="radio-item c-2"><input type="radio" id="sw2" name="sweet" value="แสบคอ"><label for="sw2">🟠 แสบคอ</label></div>
                    <div class="radio-item c-3"><input type="radio" id="sw3" name="sweet" value="กำลังดี"><label for="sw3">🟢 กำลังดี</label></div>
                    <div class="radio-item c-4"><input type="radio" id="sw4" name="sweet" value="อ้อยแพง"><label for="sw4">🔵 อ้อยแพง</label></div>
                    <div class="radio-item c-5"><input type="radio" id="sw5" name="sweet" value="ลืมใส่"><label for="sw5">🔵 ลืมใส่</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>🔥 ความเผ็ด (ระดับการศึกษา)</label>
                <div class="option-list">
                    <div class="radio-item c-1"><input type="radio" id="p1" name="spicy" value="มหาลัย" required><label for="p1">🎓 มหาลัย (เผ็ดชิบ...)</label></div>
                    <div class="radio-item c-2"><input type="radio" id="p2" name="spicy" value="มัธยม"><label for="p2">🎒 มัธยม (เผ็ดเอาเรื่อง)</label></div>
                    <div class="radio-item c-5"><input type="radio" id="p3" name="spicy" value="ประถม"><label for="p3">🐣 ประถม (ใสๆ จ้า)</label></div>
                </div>
            </div>

            <div class="form-group">
                <label>💬 เผื่อไม่พอ (ด่าได้แต่อย่าแรง)</label>
                <textarea name="comment" rows="3" placeholder="บ่นมา... รออ่านอยู่"></textarea>
            </div>

            <button type="submit" id="btn">ส่งเลย.. ถ้าใจกล้าพอ!</button>
        </form>
    </div>

    <div id="thanks">
        <h2>กราบตัก! 🙏</h2>
        <p style="font-size: 1.5rem;">รีวิวของคุณถูกบันทึกในหอเกียรติยศแล้ว</p>
        <p>ถ้าคราวหน้าไม่อร่อย ให้มาด่าที่ร้าน!</p>
        <button onclick="location.reload()">เขียนอีกรอบ (เอาให้เข็ด)</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz2EKiDS1seGr9BFtUr8jfPOQz4OcEqr2QZcV-8ZJIg9xAGQ93k5w-xtC4dU01HRQDz/exec';
    const form = document.getElementById('reviewForm');
    const btn = document.getElementById('btn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "กำลังจดลงบัญชีหนังหมา...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                document.getElementById('main-form').style.display = "none";
                document.getElementById('thanks').style.display = "block";
            })
            .catch(error => {
                alert("โอ๊ย! ระบบพัง สงสัยความกวนของคุณทำเน็ตหลุด");
                btn.disabled = false;
                btn.innerText = "ส่งเลย.. ถ้าใจกล้าพอ!";
            });
    });
</script>

</body>
</html>
